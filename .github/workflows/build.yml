name: Build and Publish Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: publisher-jessehouwing

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Azure Login (OIDC)
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        allow-no-subscriptions: true

    - name: Query Version
      id: version
      uses: jessehouwing/azdo-marketplace@e3aeebc41705a178ea7d568b99d42c6c6a24ba65 # main
      with:
        operation: query-version
        auth-type: oidc
        use: manifest
        marketplace-version-action: 'Patch'
        version-source: |
          manifest
          marketplace

    - name: Package Azure DevOps Extension
      id: package
      uses: jessehouwing/azdo-marketplace@e3aeebc41705a178ea7d568b99d42c6c6a24ba65 # main
      with:
        operation: package
        extension-version: ${{ steps.version.outputs.proposed-version }}
        update-tasks-version: major
        extension-visibility: public

    - name: Publish Azure DevOps Extension
      id: publish
      uses: jessehouwing/azdo-marketplace@e3aeebc41705a178ea7d568b99d42c6c6a24ba65 # main
      with:
        operation: publish
        auth-type: oidc
        use: vsix
        vsix-file: ${{ steps.package.outputs.vsix-file }}
        no-wait-validation: true

    - name: Wait for validation
      uses: jessehouwing/azdo-marketplace@e3aeebc41705a178ea7d568b99d42c6c6a24ba65 # main
      with:
        operation: wait-for-validation
        auth-type: oidc
        vsix-file: ${{ steps.publish.outputs.vsix-file }}

    - name: Upload artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: vsix
        path: ${{ steps.publish.outputs.vsix-file }}

    - name: Create GitHub Release
      run: gh release create "$RELEASE_VERSION" "$VSIX_FILE" --generate-notes --title "$RELEASE_VERSION"
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ steps.version.outputs.proposed-version }}
        VSIX_FILE: ${{ steps.publish.outputs.vsix-file }}

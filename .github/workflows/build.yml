name: Build and Publish Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: publisher-jessehouwing

    steps:
    - uses: actions/checkout@v4

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        allow-no-subscriptions: true

    - name: Query Version
      id: version
      uses: jessehouwing/azdo-marketplace@v6
      with:
        operation: query-version
        auth-type: oidc
        publisher-id: "jessehouwing"
        extension-id: "agent-screenshot"
        version-action: 'Patch'

    - name: Package Azure DevOps Extension
      id: package
      uses: jessehouwing/azdo-marketplace@v6
      with:
        operation: package
        extension-version: ${{ steps.version.outputs.proposed-version }}
        update-tasks-version: patch

    - name: Publish Azure DevOps Extension
      id: publish
      uses: jessehouwing/azdo-marketplace@v6
      with:
        operation: publish
        auth-type: oidc
        use: vsix
        vsix-file: ${{ steps.package.outputs.vsix-path }}

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: vsix
        path: ${{ steps.publish.outputs.vsix-path }}

    - name: Create GitHub Release
      run: gh release create "${{ steps.version.outputs.proposed-version }}" "${{ steps.publish.outputs.vsix-path }}" --generate-notes --title "${{ steps.version.outputs.proposed-version }}"
      env:
        GH_TOKEN: ${{ github.token }}

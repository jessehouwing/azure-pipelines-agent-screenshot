name: Build and Publish Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: publisher-jessehouwing

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Azure Login (OIDC)
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        allow-no-subscriptions: true

    - name: Query Version
      id: version
      uses: jessehouwing/azdo-marketplace@432f9e95096a25d6a20177e9de2599721fc0ae16 # v6
      with:
        operation: query-version
        auth-type: oidc
        publisher-id: "jessehouwing"
        extension-id: "agent-screenshot"
        version-action: 'Patch'

    - name: Select Version
      id: select-version
      shell: pwsh
      env:
        MARKETPLACE_CURRENT_VERSION: ${{ steps.version.outputs.current-version }}
        MARKETPLACE_PROPOSED_VERSION: ${{ steps.version.outputs.proposed-version }}
      run: |
        $manifestVersion = (Get-Content -Path "vss-extension.json" -Raw | ConvertFrom-Json).version
        $marketplaceCurrentVersion = $env:MARKETPLACE_CURRENT_VERSION
        $marketplaceProposedVersion = $env:MARKETPLACE_PROPOSED_VERSION

        if ([version]$manifestVersion -gt [version]$marketplaceCurrentVersion) {
          "effective-version=$manifestVersion" >> $env:GITHUB_OUTPUT
        }
        else {
          "effective-version=$marketplaceProposedVersion" >> $env:GITHUB_OUTPUT
        }

    - name: Package Azure DevOps Extension
      id: package
      uses: jessehouwing/azdo-marketplace@432f9e95096a25d6a20177e9de2599721fc0ae16 # v6
      with:
        operation: package
        extension-version: ${{ steps.select-version.outputs.effective-version }}
        update-tasks-version: major
        extension-visibility: public

    - name: Publish Azure DevOps Extension
      id: publish
      uses: jessehouwing/azdo-marketplace@432f9e95096a25d6a20177e9de2599721fc0ae16 # v6
      with:
        operation: publish
        auth-type: oidc
        use: vsix
        vsix-file: ${{ steps.package.outputs.vsix-path }}
        no-wait-validation: true

    - name: Wait for validation
      uses: jessehouwing/azdo-marketplace@432f9e95096a25d6a20177e9de2599721fc0ae16 # v6
      with:
        operation: wait-for-validation
        auth-type: oidc
        vsix-path: ${{ steps.publish.outputs.vsix-path }}

    - name: Upload artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: vsix
        path: ${{ steps.publish.outputs.vsix-path }}

    - name: Create GitHub Release
      run: gh release create "$RELEASE_VERSION" "$VSIX_PATH" --generate-notes --title "$RELEASE_VERSION"
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ steps.select-version.outputs.effective-version }}
        VSIX_PATH: ${{ steps.publish.outputs.vsix-path }}
